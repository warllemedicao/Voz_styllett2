repo_url: "https://github.com/warllemedicao/Voz_styllett2.git"
repo_dir: "/content/Super_voz"
project_subdir: "super_Voz"

styletts2_repo: "https://github.com/yl4579/StyleTTS2.git"
styletts2_dir: "/content/StyleTTS2"
drive_project_dir: "/content/drive/MyDrive/super_Voz"

raw_audio_candidates:
  - "/content/drive/MyDrive/Treinamento_Voz/Audios_Brutos"
  - "/content/drive/MyDrive/Treinamento_Voz/Audios_brutos"
  - "/content/drive/MyDrive/Audios_Brutos"
  - "/content/drive/MyDrive/Audios_brutos"
  - "/content/drive/MyDrive/super_Voz/Audios_brutos"
  - "/content/drive/MyDrive/super_Voz/Audios_Brutos"

processed_audio_candidates:
  - "/content/drive/MyDrive/Treinamento_Voz/Audios_processados"
  - "/content/drive/MyDrive/Audios_processados"
  - "/content/drive/MyDrive/super_Voz/Audios_processados"

speaker: "0"
sample_rate: 24000
val_ratio: 0.05
phonemize: true
phonemizer_language: "pt-br"

# Configuração segura para Colab/T4 15 GB.
# O erro atual é CUDA out of memory, não é mais o erro do torch.load.
epochs: 50
batch_size: 2
max_len: 160
save_freq: 5
log_interval: 10

# Mantém a fase SLM adversarial desativada no Colab comum.
joint_epoch: 999
diff_epoch: 10

# Mesmo com joint_epoch alto, deixamos estes valores seguros se você ativar SLM depois.
batch_percentage: 0.125
slm_min_len: 120
slm_max_len: 220

# Filtro de segurança do dataset para evitar amostras/transcrições longas demais.
# Se preparar menos dados do que esperado, aumente gradualmente max_audio_seconds para 15 ou 20.
max_audio_seconds: 12
max_text_chars: 280
